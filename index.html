<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Распознавание дорожных знаков</title>

<!-- TensorFlow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>

<!-- Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
    }

    #container {
        position: relative;
        width: 100%;
        max-width: 500px;
        aspect-ratio: 3/4;
        background: black;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    video,
    canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    #interface {
        margin-top: 20px;
        text-align: center;
    }

    button {
        background: #ff3b30;
        border: none;
        color: white;
        padding: 15px 30px;
        border-radius: 30px;
        font-size: 18px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    #status {
        margin-top: 15px;
        background: rgba(255,255,255,0.1);
        padding: 10px 15px;
        border-radius: 12px;
        font-size: 16px;
    }
</style>
</head>

<body>

<div id="container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
</div>

<div id="interface">
    <button id="start-btn">Включить радар знаков</button>
    <div id="status">Ожидание запуска...</div>
</div>

<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');

const startBtn = document.getElementById('start-btn');
const statusDiv = document.getElementById('status');

let model;
let isPredicting = false;

let lastSpokenSign = '';
let lastSpokenTime = 0;

/*
========================================================
ССЫЛКА НА ВАШУ МОДЕЛЬ
========================================================
*/
const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/TNJLHZfJv/';

/*
========================================================
СЛОВАРЬ ЗНАКОВ
Название класса должно совпадать
с названием класса в Teachable Machine
========================================================
*/
const signVocabulary = {   

    'znak_stop':
        'Знак стоп. Требуется полная остановка.',

    'glavnaya_doroga':
        'Главная дорога.'
};

/*
========================================================
ЗАГРУЗКА МОДЕЛИ
========================================================
*/
async function initApp() {

    statusDiv.innerText = 'Загрузка ИИ модели...';

    try {

        const modelURL = MODEL_URL + 'model.json';
        const metadataURL = MODEL_URL + 'metadata.json';

        model = await tmImage.load(modelURL, metadataURL);

        statusDiv.innerText =
            'Модель загружена. Нажмите кнопку для запуска.';

        startBtn.disabled = false;

    } catch (error) {

        console.error(error);

        statusDiv.innerText =
            'Ошибка загрузки модели.';
    }
}

/*
========================================================
ЗАПУСК КАМЕРЫ
========================================================
*/
async function startCamera() {

    statusDiv.innerText = 'Запуск камеры...';

    try {

        const stream =
            await navigator.mediaDevices.getUserMedia({

                video: {
                    facingMode: 'environment',
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                },

                audio: false
            });

        video.srcObject = stream;

        video.onloadedmetadata = () => {

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            isPredicting = true;

            startBtn.style.display = 'none';

            statusDiv.innerText =
                'Сканирование дорожных знаков...';

            detectFrame();
        };

    } catch (error) {

        console.error(error);

        statusDiv.innerText =
            'Не удалось получить доступ к камере. Нужен HTTPS.';
    }
}

/*
========================================================
ОБРАБОТКА КАДРОВ
========================================================
*/
async function detectFrame() {
    
    if (!isPredicting || !model) return;

    const predictions = await model.predict(video);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let resultText = '';

    predictions.forEach(prediction => {
        resultText += `${prediction.className}: ${Math.round(prediction.probability * 100)}% | `;
    });

    statusDiv.innerText = resultText;

    let bestPrediction = predictions[0];

    predictions.forEach(prediction => {
        if (prediction.probability > bestPrediction.probability) {
            bestPrediction = prediction;
        }
    });

    const className = bestPrediction.className;
    const probability = bestPrediction.probability;

    const translatedText = signVocabulary[className] || className;

    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(10, 10, canvas.width - 20, 80);

    ctx.fillStyle = '#00FF00';
    ctx.font = '22px Arial';

    ctx.fillText(
        `${translatedText} (${Math.round(probability * 100)}%)`,
        20,
        50
    );

    if (probability > 0.35) {
        speakSign(className);
    }

    requestAnimationFrame(detectFrame);

}

/*
========================================================
ОЗВУЧКА
========================================================
*/
function speakSign(signClass) {

    const now = Date.now();

    /*
    ========================================
    НЕ ПОВТОРЯТЬ ОДИН ЗНАК ЧАЩЕ 4 СЕК
    ========================================
    */
    if (
        signClass === lastSpokenSign &&
        now - lastSpokenTime < 4000
    ) {
        return;
    }

    const text =
        signVocabulary[signClass] || signClass;

    if ('speechSynthesis' in window) {

        window.speechSynthesis.cancel();

        const utterance =
            new SpeechSynthesisUtterance(text);

        utterance.lang = 'ru-RU';

        utterance.rate = 1.0;

        window.speechSynthesis.speak(utterance);

        lastSpokenSign = signClass;
        lastSpokenTime = now;
    }
}

/*
========================================================
КНОПКА ЗАПУСКА
========================================================
*/
startBtn.addEventListener('click', () => {

    if (model) {

        startCamera();
    }
});

/*
========================================================
СТАРТ ПРИЛОЖЕНИЯ
========================================================
*/
initApp();
</script>

</body>
</html>
