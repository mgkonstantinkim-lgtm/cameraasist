<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Распознавание дорожных знаков</title>
    <!-- Подключаем TensorFlow.js и библиотеку для распознавания объектов (например, COCO-SSD для демо) -->
    <!-- Для реальных знаков РФ лучше обучить свою модель в Teachable Machine и подключить её -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 3/4;
            background: #000;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #interface {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
        }
        button {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #status {
            margin-top: 15px;
            font-size: 16px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div id="container">
        <!-- Поток с камеры -->
        <video id="webcam" autoplay playsinline muted></video>
        <!-- Отрисовка рамок поверх видео -->
        <canvas id="overlay"></canvas>
    </div>

    <div id="interface">
        <button id="start-btn">Включить радар знаков</button>
        <br>
        <div id="status">Ожидание запуска...</div>
    </div>

<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('start-btn');
const statusDiv = document.getElementById('status');

let model = null;
let isPredicting = false;
let lastSpokenSign = '';
let lastSpokenTime = 0;

// Словарь перевода (для демонстрационной модели COCO-SSD, распознающей базовые объекты вроде stop sign)
const signVocabulary = {
    'stop sign': 'Знак Стоп. Движение без остановки запрещено.',
    'traffic light': 'Светофор',
    // Если вы загрузите свою модель знаков (пешеходный, главная дорога и т.д.), словарь расширяется здесь:
    'main_road': 'Главная дорога',
    'pedestrian_crossing': 'Пешеходный переход'
};

// 1. Инициализация и загрузка ИИ-модели
async function initApp() {
    statusDiv.innerText = 'Загрузка ИИ-модели...';
    try {
        // Загружаем предобученную модель распознавания объектов
        model = await cocoSsd.load();
        statusDiv.innerText = 'Модель загружена. Нажмите кнопку для старта.';
        startBtn.disabled = false;
    } catch (error) {
        statusDiv.innerText = 'Ошибка загрузки модели: ' + error.message;
    }
}

// 2. Запуск основной (задней) камеры смартфона
async function startCamera() {
    statusDiv.innerText = 'Запуск камеры...';
    const constraints = {
        video: {
            // Режим 'environment' принудительно активирует заднюю камеру телефона
            facingMode: 'environment', 
            width: { ideal: 640 },
            height: { ideal: 480 }
        },
        audio: false
    };

    try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        
        // Корректируем размер холста под видео, когда оно загрузится
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            isPredicting = true;
            statusDiv.innerText = 'Сканирование дороги...';
            startBtn.style.display = 'none'; // Скрываем кнопку после старта
            detectFrame();
        };
    } catch (err) {
        statusDiv.innerText = 'Доступ к камере отклонен или недоступен (нужен HTTPS).';
        console.error(err);
    }
}

// 3. Цикл обработки кадров и распознавания
async function detectFrame() {
    if (!isPredicting) return;

    // Получаем предсказания нейросети для текущего кадра видео
    const predictions = await model.detect(video);
    
    // Очищаем холст перед новой отрисовкой
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    predictions.forEach(prediction => {
        // Проверяем, есть ли распознанный объект в нашем словаре знаков и уверенность ИИ > 65%
        if (signVocabulary[prediction.class] && prediction.score > 0.65) {
            const [x, y, width, height] = prediction.bbox;
            
            // Рисуем рамку вокруг знака
            ctx.strokeStyle = '#00FF00';
            ctx.lineWidth = 4;
            ctx.strokeRect(x, y, width, height);
            
            // Текст над рамкой
            ctx.fillStyle = '#00FF00';
            ctx.font = '18px Arial';
            ctx.fillText(signVocabulary[prediction.class], x, y > 20 ? y - 10 : 20);
            
            // Озвучиваем знак
            speakSign(prediction.class);
        }
    });

    // Рекурсивно вызываем следующий кадр (обычно 20-30 FPS в зависимости от процессора телефона)
    requestAnimationFrame(detectFrame);
}

// 4. Синтез речи (Web Speech API)
function speakSign(signClass) {
    const now = Date.now();
    const ruText = signVocabulary[signClass];
    
    // Защита от "зацикливания" — не повторять тот же знак чаще, чем раз в 4 секунды
    if (signClass === lastSpokenSign && (now - lastSpokenTime) < 4000) {
        return; 
    }

    if ('speechSynthesis' in window) {
        // Останавливаем прошлую речь, если она не успела договорить
        window.speechSynthesis.cancel(); 
        
        const utterance = new SpeechSynthesisUtterance(ruText);
        utterance.lang = 'ru-RU';
        utterance.rate = 1.0; // Скорость речи
        
        window.speechSynthesis.speak(utterance);
        
        lastSpokenSign = signClass;
        lastSpokenTime = now;
    }
}

// Привязка к кнопке (браузеры блокируют звук и камеру без прямого клика пользователя)
startBtn.addEventListener('click', () => {
    if (model) {
        startCamera();
    }
});

// Запуск приложения
initApp();
</script>
</body>
</html>
